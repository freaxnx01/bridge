<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark" />
<title>Bridge — Project Scope</title>
<style>
  :root{
    color-scheme:dark;
    --void:#070b10; --scope:#0c131c; --bandA:#11202b; --bandB:#0d1822;
    --grid:#21404f; --phosphor:#4ec9c1; --signal:#e8a33d; --alert:#e5484d;
    --ink:#c9d6df; --dim:#5e7280;
    --mono:ui-monospace,"JetBrains Mono","SF Mono",Menlo,Consolas,monospace;
    --sans:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--void);color:var(--ink);font-family:var(--mono);overflow:hidden;
       background-image:radial-gradient(circle at 50% 45%,#0d1822 0%,#070b10 70%);}
  .app{position:fixed;inset:0;display:grid;grid-template-columns:300px 1fr}
  @media (max-width:760px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}}

  /* HUD rail */
  .rail{border-right:1px solid #16242f;padding:22px 20px;display:flex;flex-direction:column;gap:24px;
        min-width:0;background:linear-gradient(180deg,#0a1119,#070b10)}
  @media (max-width:760px){.rail{border-right:none;border-bottom:1px solid #16242f}}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-family:var(--sans);font-weight:600;letter-spacing:.14em;font-size:18px;margin:0}
  .brand .tag{font-size:10px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase}
  .eyebrow{font-size:10px;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;margin-bottom:9px}

  .toggle{display:flex;border:1px solid #23404e;border-radius:8px;overflow:hidden}
  .toggle button{flex:1;appearance:none;background:transparent;border:none;color:var(--dim);
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:9px 6px;cursor:pointer}
  .toggle button[aria-pressed="true"]{background:#10212c;color:var(--phosphor);box-shadow:inset 0 -2px 0 var(--phosphor)}
  .toggle button:hover{color:var(--ink)}

  .task .name{font-size:14px;color:var(--signal)}
  .bar{height:5px;background:#15222c;border-radius:3px;margin:11px 0 7px;overflow:hidden}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#b97c1e,var(--signal));border-radius:3px;
         transition:width .9s cubic-bezier(.2,.7,.2,1)}
  .task .count{font-size:11px;color:var(--dim)}

  .legend{display:flex;flex-direction:column;gap:9px;font-size:11px;color:#9fb6c0}
  .legend .row{display:flex;align-items:center;gap:10px}
  .swatch{width:18px;height:0;border-top:2px solid;flex:none}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}

  .hint{margin-top:auto;font-size:11px;color:var(--dim);line-height:1.6}
  .hint kbd{font-family:var(--mono);background:#13212b;border:1px solid #25404e;border-radius:4px;
            padding:1px 6px;color:#9fb6c0;font-size:10px}

  /* stage */
  .stage{position:relative;min-width:0}
  svg.scope{position:absolute;inset:0;width:100%;height:100%;cursor:grab;touch-action:none}
  svg.scope.drag{cursor:grabbing}
  svg.scope.dim{opacity:0;transition:opacity .28s ease}
  #bgOnion,#bgLayer{transition:opacity .5s ease}
  #wedge{transition:opacity .5s ease}

  .statusline{position:absolute;left:0;right:0;bottom:0;padding:10px 18px;display:flex;gap:24px;
    font-size:11px;color:var(--dim);border-top:1px solid #14222c;background:rgba(7,11,16,.72);backdrop-filter:blur(3px)}
  .statusline b{color:#9fb6c0;font-weight:500}
  .statusline .live{color:var(--signal)} .statusline .live::before{content:"● "}

  .blip-label{font-family:var(--mono);font-size:11px;fill:#8fa6b1;pointer-events:none;user-select:none;text-anchor:middle}
  .ring-label,.band-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;fill:#3f5b69;user-select:none}
  .ring-label{text-anchor:middle}
  .blip{cursor:pointer}
  .blip circle.body{transition:stroke .15s ease}
  .blip:hover circle.body{stroke:var(--ink)}

  @keyframes agentPing{0%{r:5;opacity:1}70%{opacity:.15}100%{r:20;opacity:0}}
  @keyframes sweepPulse{0%,100%{opacity:.9}50%{opacity:.45}}
  .agent-ping{fill:none;stroke:var(--signal);stroke-width:1.4;animation:agentPing 1.9s ease-out infinite}
  .agent-core{fill:var(--signal)}
  .sweep-front{animation:sweepPulse 2.6s ease-in-out infinite}

  /* component (drill-down) view */
  .detail{position:absolute;inset:0;padding:30px 38px 70px;overflow:auto;
    background:radial-gradient(circle at 62% 26%,#0d1a24 0%,#070b10 76%);
    opacity:0;pointer-events:none;transition:opacity .3s ease}
  .detail.show{opacity:1;pointer-events:auto}
  .back{appearance:none;font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:#9fb6c0;
    background:#0e1a23;border:1px solid #25404e;border-radius:6px;padding:7px 13px;cursor:pointer;text-transform:uppercase}
  .back:hover{border-color:var(--phosphor);color:var(--phosphor)}
  .d-head{display:flex;align-items:baseline;gap:14px;margin:18px 0 4px;flex-wrap:wrap}
  .d-head h2{font-family:var(--sans);font-weight:600;font-size:24px;margin:0}
  .d-head .layer{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--phosphor)}
  .meta{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-bottom:24px}
  .meta b{color:var(--ink);font-weight:500}
  .meta .agent{color:var(--signal)}

  .panels{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media (max-width:820px){.panels{grid-template-columns:1fr}}
  .panel{border:1px solid #1b2e3a;border-radius:12px;background:#0a141c;padding:18px}
  .panel h3{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;
            color:var(--dim);margin:0 0 14px;display:flex;align-items:center;gap:8px}
  .panel h3 .gh{color:#9fb6c0}

  /* git */
  .git-branch{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--phosphor);margin-bottom:4px}
  .git-sub{font-size:11px;color:var(--dim);margin-bottom:14px;word-break:break-all}
  .git-pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .pill{font-size:10.5px;padding:3px 9px;border-radius:11px;border:1px solid #2a4654;color:#9fb6c0;background:#0e1a23}
  .pill.ahead{border-color:#2f5d4a;color:#6fd0a6} .pill.behind{border-color:#5d4a2f;color:#d0b46f}
  .pill.dirty{border-color:#5d3a3a;color:#e09a9a} .pill.clean{border-color:#2f5d4a;color:#6fd0a6}
  .commit{display:flex;gap:10px;padding:7px 0;border-top:1px solid #14222c;font-size:12px}
  .commit:first-of-type{border-top:none}
  .commit .sha{color:var(--signal);flex:none}
  .commit .msg{color:#bcd2dc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .commit .when{color:var(--dim);flex:none;margin-left:auto}

  /* issues */
  .issue{padding:11px 0;border-top:1px solid #14222c}
  .issue:first-of-type{border-top:none}
  .issue .top{display:flex;gap:8px;font-size:13px}
  .issue .num{color:var(--dim);flex:none}
  .issue .title{color:#d2dfe6}
  .issue .labels{display:flex;gap:6px;flex-wrap:wrap;margin:7px 0 0 22px}
  .lab{font-size:9.5px;padding:2px 7px;border-radius:9px;border:1px solid currentColor;opacity:.9}
  .lab.bug{color:#e5746f} .lab.enh{color:#6fa8e5} .lab.comp{color:var(--phosphor)} .lab.agent{color:var(--signal)}
  .issue .who{font-size:10.5px;color:var(--dim);margin:6px 0 0 22px}
  .empty{font-size:12px;color:var(--dim);line-height:1.6}
  .joinnote{font-size:10.5px;color:var(--dim);margin-top:14px;border-top:1px solid #14222c;padding-top:11px}
  .joinnote code{color:var(--phosphor)}

  /* wireframe / flow (UI components) */
  .wide{grid-column:1/-1}
  pre.wire{font-family:var(--mono);font-size:12.5px;line-height:1.5;color:#bcd2dc;background:#08111a;
    border:1px solid #16262f;border-radius:8px;padding:16px;margin:0;overflow:auto}
  .flow{display:flex;flex-direction:column}
  .fbox{border:1px solid #2a4654;border-radius:8px;padding:9px 13px;background:#0c1922;font-size:12px;min-width:200px}
  .fbox .ly{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:3px}
  .fbox.active{border-color:var(--signal)} .fbox.active .ly{color:var(--signal)}
  .farrow{height:16px;width:1px;background:#2a4654;margin-left:24px}
  .farrow.active{background:var(--signal)}

  @media (prefers-reduced-motion:reduce){
    .agent-ping{animation:none;opacity:0}.sweep-front{animation:none;opacity:.7}
    .bar>i,.detail,svg.scope.dim,#bgOnion,#bgLayer,#wedge{transition:none}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><h1>BRIDGE</h1><span class="tag">scope</span></div>

    <div>
      <div class="eyebrow">Projection</div>
      <div class="toggle" role="group" aria-label="view">
        <button id="v-onion" aria-pressed="true">Onion</button>
        <button id="v-layer" aria-pressed="false">Layer</button>
      </div>
    </div>

    <div class="task">
      <div class="eyebrow">Active task</div>
      <div class="name" id="t-name">—</div>
      <div class="bar"><i id="t-bar"></i></div>
      <div class="count" id="t-count">—</div>
    </div>

    <div>
      <div class="eyebrow">Legend</div>
      <div class="legend">
        <div class="row"><span class="swatch" style="border-color:var(--phosphor)"></span> points inward — ok</div>
        <div class="row"><span class="swatch" style="border-color:var(--alert)"></span> points outward — violation</div>
        <div class="row"><span class="dot" style="background:var(--signal)"></span> agent working here</div>
      </div>
    </div>

    <div class="hint">scroll to <kbd>zoom</kbd> · drag to <kbd>pan</kbd><br/>click a component to drill in</div>
  </aside>

  <main class="stage">
    <svg class="scope" id="scope" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet">
      <defs>
        <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#e8a33d" stop-opacity="0"/>
          <stop offset="100%" stop-color="#e8a33d" stop-opacity=".22"/>
        </radialGradient>
        <filter id="soft"><feGaussianBlur stdDeviation="1.1"/></filter>
      </defs>
      <g id="bgOnion"></g>
      <g id="bgLayer" opacity="0"></g>
      <g id="wedge"></g>
      <g id="edges"></g>
      <g id="blips"></g>
    </svg>

    <div class="statusline">
      <span><b>repo</b> dms-inbox</span>
      <span><b>branch</b> feat/semantic-search</span>
      <span class="live">agent · SearchDocuments · TDD 7/11</span>
    </div>

    <section class="detail" id="detail" aria-hidden="true">
      <button class="back" id="back">← scope</button>
      <div class="d-head"><h2 id="d-name"></h2><span class="layer" id="d-layer"></span></div>
      <div class="meta" id="d-meta"></div>
      <div class="panels" id="d-panels"></div>
    </section>
  </main>
</div>

<script>
/* ===== DATA — stands in for resolver + git/issues providers ===== */
const BRIDGE = {
  layers:[ {id:"domain",name:"DOMAIN"},{id:"app",name:"APPLICATION"},
           {id:"infra",name:"INFRASTRUCTURE"},{id:"ui",name:"PRESENTATION"} ], // core -> outer
  components:[
    {id:"Document",       layer:0,cov:.91,issues:0,tests:[22,22]},
    {id:"Tagging",        layer:0,cov:.84,issues:1,tests:[9,11]},
    {id:"IngestDocument", layer:1,cov:.77,issues:2,tests:[14,18]},
    {id:"SearchDocuments",layer:1,cov:.63,issues:1,tests:[7,11],agent:true},
    {id:"PaperlessClient",layer:2,cov:.55,issues:0,tests:[6,10]},
    {id:"OllamaEmbeddings",layer:2,cov:.40,issues:1,tests:[3,8]},
    {id:"PostgresRepo",   layer:2,cov:.71,issues:0,tests:[9,12]},
    {id:"InboxUI",        layer:3,cov:.48,issues:3,tests:[5,12]},
    {id:"SearchUI",       layer:3,cov:.31,issues:2,tests:[3,9],kind:"ui"},
  ],
  deps:[
    ["InboxUI","IngestDocument"],["SearchUI","SearchDocuments"],
    ["IngestDocument","Document"],["IngestDocument","PaperlessClient"], // outward -> violation
    ["SearchDocuments","Document"],["PaperlessClient","Document"],
    ["OllamaEmbeddings","Document"],["PostgresRepo","Document"],
  ],
  feature:{name:"Semantic search",done:7,total:11,
           touches:["SearchUI","SearchDocuments","OllamaEmbeddings","PostgresRepo"]},
  git:{ // per component; repo default used as fallback
    _default:{branch:"main",worktree:"main",ahead:0,behind:0,dirty:0,
      recent:[{sha:"c0ffee1",msg:"chore: bump EF Core to 10.0.1",when:"3d"}]},
    SearchUI:{branch:"feat/semantic-search",worktree:"../wt/semantic-search",ahead:6,behind:1,dirty:3,
      recent:[{sha:"a1f3c2d",msg:"wire SearchUI to SearchDocuments handler",when:"40m"},
              {sha:"e88b410",msg:"add debounced query box component",when:"3h"},
              {sha:"4d2a9f1",msg:"scaffold search results list",when:"1d"}]},
    SearchDocuments:{branch:"feat/semantic-search",worktree:"../wt/semantic-search",ahead:6,behind:1,dirty:2,
      recent:[{sha:"7b9e1a4",msg:"test: failing spec for hybrid rank (red)",when:"12m"},
              {sha:"a1f3c2d",msg:"define SearchDocuments handler contract",when:"40m"}]},
    OllamaEmbeddings:{branch:"feat/semantic-search",worktree:"../wt/semantic-search",ahead:6,behind:1,dirty:0,
      recent:[{sha:"9c10b2e",msg:"add embed() over /api/embeddings",when:"5h"}]},
    InboxUI:{branch:"main",worktree:"main",ahead:0,behind:0,dirty:0,
      recent:[{sha:"b41e0aa",msg:"fix: inbox count after ingest",when:"2d"}]},
  },
  issues:{ // joined to components by the `component:` label
    SearchUI:[
      {n:142,title:"Result list flickers on rapid query input",labels:["bug","comp"],who:"freaxnx01",age:"2d"},
      {n:137,title:"Keyboard navigation for results (a11y)",labels:["enh","comp","agent"],who:"freaxnx01",age:"5d"}],
    SearchDocuments:[
      {n:145,title:"Rank by hybrid BM25 + vector score",labels:["enh","comp","agent"],who:"freaxnx01",age:"1d"}],
    OllamaEmbeddings:[
      {n:140,title:"Cache embeddings for unchanged documents",labels:["enh","comp"],who:"freaxnx01",age:"4d"}],
    Tagging:[
      {n:131,title:"Auto-tag confidence threshold too low",labels:["bug","comp"],who:"freaxnx01",age:"1w"}],
    InboxUI:[
      {n:133,title:"Drag-drop upload skips .eml files",labels:["bug","comp"],who:"freaxnx01",age:"1w"},
      {n:128,title:"Bulk-tag selected documents",labels:["enh","comp"],who:"freaxnx01",age:"2w"},
      {n:119,title:"Inbox count off by one after ingest",labels:["bug","comp"],who:"freaxnx01",age:"3w"}],
  },
  detail:{ // L1 wireframe/flow for UI components
    SearchUI:{
      wire:["┌────────────────────────────────────────┐",
            "│  search                                 │",
            "│  ┌──────────────────────────────┐  ⏎   │",
            "│  │ invoices from acme last quarter│      │",
            "│  └──────────────────────────────┘      │",
            "├────────────────────────────────────────┤",
            "│  ▸ invoice_2026_q1.pdf      92%   open  │",
            "│  ▸ contract_acme_v3.pdf     88%   open  │",
            "│  ▸ receipt_sbb_zurich.pdf   71%         │",
            "├────────────────────────────────────────┤",
            "│  type ▾   tag ▾   date ▾      47 hits   │",
            "└────────────────────────────────────────┘"].join("\n"),
      flow:[{t:"Query input (debounce 300ms)",layer:"presentation",active:true},
            {t:"SearchDocuments handler",layer:"application",active:true},
            {t:"OllamaEmbeddings · embed query",layer:"infrastructure",active:true},
            {t:"PostgresRepo · pgvector kNN",layer:"infrastructure",active:true},
            {t:"Rank + project to DTO",layer:"application",active:false},
            {t:"Render result list",layer:"presentation",active:false}]},
  }
};

/* ===== helpers ===== */
const SVGNS="http://www.w3.org/2000/svg";
const el=(n,a={})=>{const e=document.createElementNS(SVGNS,n);for(const k in a)e.setAttribute(k,a[k]);return e;};
const comp=id=>BRIDGE.components.find(c=>c.id===id);
const layerName=i=>(BRIDGE.layers[i]?.name||"UNASSIGNED");
const touched=new Set(BRIDGE.feature.touches);
const N=BRIDGE.layers.length;
const reduce=matchMedia("(prefers-reduced-motion:reduce)").matches;
const covColor=c=>c>=.7?"#4ec9c1":c>=.5?"#9cc06a":c>=.35?"#e8a33d":"#e5484d";
// literal colors for SVG presentation attributes (Chrome won't resolve var() there)
const C={bandA:"#11202b",bandB:"#0d1822",grid:"#21404f",phosphor:"#4ec9c1",signal:"#e8a33d",alert:"#e5484d"};

/* ===== layout: positions per view ===== */
const CX=500,CY=500, RMAX=470, RHOLE=40;
const ringMid=d=>RHOLE+(d+0.5)*((RMAX-RHOLE)/N);
// layer-view band geometry: inset margin + vertical gap between lanes
const LMARGIN=30, LGAP=26;
const LBANDH=(1000-LGAP*(N-1))/N;
const layerBandTop=d=>(N-1-d)*(LBANDH+LGAP);   // depth 0 sits at the bottom
function onionPositions(){
  const byRing={}; BRIDGE.components.forEach(c=>(byRing[c.layer]??=[]).push(c));
  // keep feature-touched components clustered in one angular sector for the wedge
  const angles={Document:268,Tagging:92,IngestDocument:150,SearchDocuments:320,
    PaperlessClient:118,OllamaEmbeddings:300,PostgresRepo:342,InboxUI:140,SearchUI:326};
  const pos={};
  BRIDGE.components.forEach(c=>{
    const a=(angles[c.id]-90)*Math.PI/180, r=ringMid(c.layer);
    pos[c.id]={x:CX+r*Math.cos(a),y:CY+r*Math.sin(a)};
  });
  return pos;
}
function layerPositions(){
  const byRing={};
  BRIDGE.components.forEach(c=>(byRing[c.layer]??=[]).push(c));
  const pos={}, innerW=1000-2*LMARGIN;
  Object.entries(byRing).forEach(([d,members])=>{
    const y=layerBandTop(+d)+LBANDH/2;
    members.sort((a,b)=>a.id.localeCompare(b.id));
    members.forEach((c,i)=>pos[c.id]={x:LMARGIN+(i+1)/(members.length+1)*innerW,y});
  });
  return pos;
}
const onionPos=onionPositions(), layerPos=layerPositions();
const state={view:"onion",pos:JSON.parse(JSON.stringify(onionPos))};

/* ===== backgrounds ===== */
function buildOnionBg(){
  const g=document.getElementById("bgOnion");
  for(let d=N-1;d>=0;d--){
    g.appendChild(el("circle",{cx:CX,cy:CY,r:RHOLE+(d+1)*((RMAX-RHOLE)/N),
      fill:d%2?C.bandB:C.bandA}));
  }
  for(let d=0;d<N;d++){
    const r=RHOLE+(d+1)*((RMAX-RHOLE)/N);
    g.appendChild(el("circle",{cx:CX,cy:CY,r,fill:"none",stroke:C.grid,"stroke-width":1}));
    const t=el("text",{x:CX,y:CY-ringMid(d)+3,class:"ring-label"});t.textContent=BRIDGE.layers[d].name;g.appendChild(t);
  }
  g.appendChild(el("circle",{cx:CX,cy:CY,r:RHOLE,fill:"#0a1620",stroke:C.grid,"stroke-width":1}));
}
function buildLayerBg(){
  const g=document.getElementById("bgLayer");
  for(let d=0;d<N;d++){
    const y=layerBandTop(d);
    g.appendChild(el("rect",{x:LMARGIN,y,width:1000-2*LMARGIN,height:LBANDH,rx:18,ry:18,
      fill:d%2?C.bandB:C.bandA,stroke:C.grid,"stroke-width":1}));
    const t=el("text",{x:LMARGIN+18,y:y+26,class:"band-label"});t.textContent=BRIDGE.layers[d].name;g.appendChild(t);
  }
}
function buildWedge(){
  const g=document.getElementById("wedge"); const a1=294,a2=348;
  const rOut=RMAX, rIn=RHOLE;
  const P=(r,deg)=>[CX+r*Math.cos((deg-90)*Math.PI/180),CY+r*Math.sin((deg-90)*Math.PI/180)];
  const sector=(rO,rI,fill,cls)=>{
    const [ox1,oy1]=P(rO,a1),[ox2,oy2]=P(rO,a2),[ix2,iy2]=P(rI,a2),[ix1,iy1]=P(rI,a1);
    return el("path",{d:`M ${ox1} ${oy1} A ${rO} ${rO} 0 0 1 ${ox2} ${oy2} L ${ix2} ${iy2} A ${rI} ${rI} 0 0 0 ${ix1} ${iy1} Z`,
      fill,...(cls?{class:cls}:{})});
  };
  g.appendChild(sector(rOut,rIn,"url(#sweepGrad)"));
  const prog=BRIDGE.feature.done/BRIDGE.feature.total, rProg=rOut-(rOut-rIn)*prog;
  g.appendChild(sector(rOut,rProg,"rgba(232,163,61,.16)"));
  const [fx1,fy1]=P(rOut,(a1+a2)/2),[fx2,fy2]=P(rProg,(a1+a2)/2);
  g.appendChild(el("line",{x1:fx1,y1:fy1,x2:fx2,y2:fy2,class:"sweep-front",
    stroke:C.signal,"stroke-width":1.4,filter:"url(#soft)"}));
}

/* ===== blips (built once, repositioned via transform) ===== */
const blipEls={};
function buildBlips(){
  const layer=document.getElementById("blips");
  BRIDGE.components.forEach(c=>{
    const g=el("g",{class:"blip"}); g.dataset.id=c.id;
    g.appendChild(el("circle",{r:24,fill:"#000","fill-opacity":0,"pointer-events":"all"})); // finger-sized tap target
    if(touched.has(c.id)) g.appendChild(el("circle",{r:16,fill:"none",stroke:C.signal,
      "stroke-width":1,"stroke-dasharray":"2 4","opacity":.7}));
    const R=12,circ=2*Math.PI*R;
    g.appendChild(el("circle",{r:R,fill:"none",stroke:"#1c2e39","stroke-width":3}));
    g.appendChild(el("circle",{r:R,fill:"none",stroke:covColor(c.cov),"stroke-width":3,
      "stroke-dasharray":`${circ*c.cov} ${circ}`,"stroke-linecap":"round",transform:"rotate(-90)"}));
    g.appendChild(el("circle",{r:7,class:"body",fill:"#0c1922",stroke:"#3a5a68","stroke-width":1.5}));
    if(c.issues>0){
      g.appendChild(el("circle",{cx:10,cy:-10,r:6.5,fill:"#231a0c",stroke:C.signal,"stroke-width":1}));
      const b=el("text",{x:10,y:-7,"text-anchor":"middle","font-family":"ui-monospace,monospace","font-size":8.5,fill:C.signal});
      b.textContent=c.issues;g.appendChild(b);
    }
    const lab=el("text",{x:0,y:30,class:"blip-label"});lab.textContent=c.id;g.appendChild(lab);
    if(c.agent){g.appendChild(el("circle",{r:5,class:"agent-ping"}));g.appendChild(el("circle",{r:3.4,class:"agent-core"}));}
    g.addEventListener("pointerup",e=>{if(moved)return;focus(c.id);});
    blipEls[c.id]=g; layer.appendChild(g);
  });
}

/* ===== edges (built once, endpoints updated each frame) ===== */
const edgeEls=[];
function buildEdges(){
  const g=document.getElementById("edges");
  BRIDGE.deps.forEach(([from,to])=>{
    const violation=comp(to).layer>comp(from).layer;
    const line=el("line",{stroke:violation?C.alert:"rgba(78,201,193,.30)",
      "stroke-width":violation?1.8:1,"stroke-dasharray":violation?"5 4":"none"});
    g.appendChild(line); edgeEls.push({line,from,to,violation});
  });
}
function applyPositions(){
  BRIDGE.components.forEach(c=>{const p=state.pos[c.id];blipEls[c.id].setAttribute("transform",`translate(${p.x} ${p.y})`);});
  edgeEls.forEach(e=>{const a=state.pos[e.from],b=state.pos[e.to];
    e.line.setAttribute("x1",a.x);e.line.setAttribute("y1",a.y);
    e.line.setAttribute("x2",b.x);e.line.setAttribute("y2",b.y);});
}

/* ===== view toggle + morph ===== */
function setView(v){
  if(v===state.view)return;
  state.view=v;
  document.getElementById("v-onion").setAttribute("aria-pressed",v==="onion");
  document.getElementById("v-layer").setAttribute("aria-pressed",v==="layer");
  document.getElementById("bgOnion").setAttribute("opacity",v==="onion"?1:0);
  document.getElementById("bgLayer").setAttribute("opacity",v==="layer"?1:0);
  document.getElementById("wedge").setAttribute("opacity",v==="onion"?1:0);
  animateVB({...HOME}, reduce?0:520);
  const from=JSON.parse(JSON.stringify(state.pos)), to=v==="onion"?onionPos:layerPos;
  morph(from,to, reduce?0:620);
}
function morph(from,to,ms){
  if(ms===0){state.pos=JSON.parse(JSON.stringify(to));applyPositions();return;}
  const t0=performance.now(), ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  (function step(now){
    const p=Math.min(1,(now-t0)/ms),e=ease(p);
    BRIDGE.components.forEach(c=>{state.pos[c.id]={
      x:from[c.id].x+(to[c.id].x-from[c.id].x)*e, y:from[c.id].y+(to[c.id].y-from[c.id].y)*e};});
    applyPositions();
    if(p<1)requestAnimationFrame(step);
  })(performance.now());
}
document.getElementById("v-onion").addEventListener("click",()=>setView("onion"));
document.getElementById("v-layer").addEventListener("click",()=>setView("layer"));

/* ===== pan + zoom ===== */
const svg=document.getElementById("scope");
let vb={x:0,y:0,w:1000,h:1000}; const HOME={x:0,y:0,w:1000,h:1000};
const setVB=()=>svg.setAttribute("viewBox",`${vb.x} ${vb.y} ${vb.w} ${vb.h}`);
const c2s=(cx,cy)=>{const r=svg.getBoundingClientRect();return[vb.x+(cx-r.left)/r.width*vb.w,vb.y+(cy-r.top)/r.height*vb.h];};
svg.addEventListener("wheel",e=>{e.preventDefault();const[mx,my]=c2s(e.clientX,e.clientY);
  const k=e.deltaY>0?1.12:0.89,nw=Math.min(1600,Math.max(180,vb.w*k));
  vb.x=mx-(mx-vb.x)*(nw/vb.w);vb.y=my-(my-vb.y)*(nw/vb.h);vb.w=nw;vb.h=nw;setVB();},{passive:false});
let dragging=false,moved=false,last=[0,0],startPt=[0,0];
svg.addEventListener("pointerdown",e=>{dragging=true;moved=false;last=[e.clientX,e.clientY];startPt=[e.clientX,e.clientY];svg.classList.add("drag");});
svg.addEventListener("pointermove",e=>{if(!dragging)return;const r=svg.getBoundingClientRect();
  const dx=(e.clientX-last[0])/r.width*vb.w,dy=(e.clientY-last[1])/r.height*vb.h;
  if(Math.hypot(e.clientX-startPt[0],e.clientY-startPt[1])>6)moved=true;
  vb.x-=dx;vb.y-=dy;last=[e.clientX,e.clientY];setVB();});
const end=()=>{dragging=false;svg.classList.remove("drag");};
svg.addEventListener("pointerup",end);svg.addEventListener("pointercancel",end);svg.addEventListener("pointerleave",end);

/* ===== semantic drill-down ===== */
function animateVB(target,ms,then){
  if(ms===0){vb={...target};setVB();then&&then();return;}
  const s={...vb},t0=performance.now(),ease=t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  (function step(now){const p=Math.min(1,(now-t0)/ms),e=ease(p);
    vb={x:s.x+(target.x-s.x)*e,y:s.y+(target.y-s.y)*e,w:s.w+(target.w-s.w)*e,h:s.h+(target.h-s.h)*e};
    setVB();if(p<1)requestAnimationFrame(step);else then&&then();})(performance.now());
}
const detail=document.getElementById("detail");
function focus(id){
  const p=state.pos[id];
  animateVB({x:p.x-160,y:p.y-160,w:320,h:320},reduce?0:360,()=>{
    svg.classList.add("dim");renderDetail(comp(id));
    detail.classList.add("show");detail.setAttribute("aria-hidden","false");detail.scrollTop=0;
  });
}
function home(){detail.classList.remove("show");detail.setAttribute("aria-hidden","true");
  svg.classList.remove("dim");animateVB({...HOME},reduce?0:380);}
document.getElementById("back").addEventListener("click",home);

function renderDetail(c){
  document.getElementById("d-name").textContent=c.id;
  document.getElementById("d-layer").textContent=layerName(c.layer);
  const meta=document.getElementById("d-meta");meta.innerHTML="";
  const add=(l,v,cls="")=>{const s=document.createElement("span");if(cls)s.className=cls;
    s.innerHTML=`${l} <b>${v}</b>`;meta.appendChild(s);};
  add("coverage",Math.round(c.cov*100)+"%");add("tests",`${c.tests[0]}/${c.tests[1]} passing`);
  add("open issues",c.issues);if(c.agent)add("","◆ agent working here","agent");

  const g=BRIDGE.git[c.id]||BRIDGE.git._default;
  const issues=BRIDGE.issues[c.id]||[];
  const panels=document.getElementById("d-panels");

  const pills=[
    g.ahead?`<span class="pill ahead">↑ ${g.ahead} ahead</span>`:"",
    g.behind?`<span class="pill behind">↓ ${g.behind} behind</span>`:"",
    g.dirty?`<span class="pill dirty">● ${g.dirty} uncommitted</span>`:`<span class="pill clean">✓ clean</span>`,
  ].join("");
  const commits=g.recent.map(r=>`<div class="commit"><span class="sha">${r.sha}</span>
    <span class="msg">${r.msg}</span><span class="when">${r.when} ago</span></div>`).join("");

  const labName={bug:"bug",enh:"enhancement",comp:"component:"+c.id,agent:"agent"};
  const issuesHtml = issues.length
    ? issues.map(i=>`<div class="issue"><div class="top"><span class="num">#${i.n}</span>
        <span class="title">${i.title}</span></div>
        <div class="labels">${i.labels.map(l=>`<span class="lab ${l}">${labName[l]}</span>`).join("")}</div>
        <div class="who">@${i.who} · opened ${i.age} ago</div></div>`).join("")
    : `<div class="empty">No open issues — this node is quiet.<br/>Issues tagged
        <code>component:${c.id}</code> would surface here.</div>`;

  panels.innerHTML=`
    <div class="panel">
      <h3>Git</h3>
      <div class="git-branch">⎇ ${g.branch}</div>
      <div class="git-sub">worktree · ${g.worktree}</div>
      <div class="git-pills">${pills}</div>
      ${commits}
    </div>
    <div class="panel">
      <h3><span class="gh">⌥</span> Open issues ${issues.length?`· ${issues.length}`:""}</h3>
      ${issuesHtml}
      <div class="joinnote">joined to this node by label <code>component:${c.id}</code></div>
    </div>`;

  const d=BRIDGE.detail[c.id];
  if(d){
    const wf=document.createElement("div");wf.className="panel wide";
    wf.innerHTML=`<h3>Wireframe &amp; flow</h3>`;
    const grid=document.createElement("div");
    grid.style.cssText="display:grid;grid-template-columns:minmax(260px,1fr) 1fr;gap:22px";
    const pre=document.createElement("pre");pre.className="wire";pre.textContent=d.wire;
    const flow=document.createElement("div");flow.className="flow";
    d.flow.forEach((s,i)=>{const b=document.createElement("div");b.className="fbox"+(s.active?" active":"");
      b.innerHTML=`<span class="ly">${s.layer}</span>${s.t}`;flow.appendChild(b);
      if(i<d.flow.length-1){const ar=document.createElement("div");
        ar.className="farrow"+((s.active&&d.flow[i+1].active)?" active":"");flow.appendChild(ar);}});
    grid.appendChild(pre);grid.appendChild(flow);wf.appendChild(grid);panels.appendChild(wf);
  }
}

/* ===== HUD ===== */
function fillHud(){
  const f=BRIDGE.feature;
  document.getElementById("t-name").textContent=f.name;
  document.getElementById("t-count").textContent=`${f.done} / ${f.total} tasks`;
  requestAnimationFrame(()=>document.getElementById("t-bar").style.width=(100*f.done/f.total)+"%");
}

/* ===== go ===== */
buildOnionBg();buildLayerBg();buildWedge();buildEdges();buildBlips();
applyPositions();fillHud();setVB();
</script>
</body>
</html>
