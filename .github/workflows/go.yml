name: go

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest temporarily excluded by request —
        # re-add them to this list to restore those CI jobs. The ubuntu job
        # still cross-compiles the Windows binary (see the cross-compile step
        # below).
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
      - name: e2e
        run: go test -tags=e2e ./e2e/...
      - name: cross-compile windows (linux job only)
        if: matrix.os == 'ubuntu-latest'
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o /tmp/bridge.exe ./cmd/bridge
